# 開発専用の構成。パスワードのハードコードはローカル開発に閉じているため
# 許容している(本番は docker-compose.prod.yml + .env.production を使うこと)。
services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fhir_server_development
    volumes:
      # Postgres 18+ expects the mount at /var/lib/postgresql (data lives in a
      # version-specific subdirectory), not /var/lib/postgresql/data.
      - pg_data:/var/lib/postgresql
    ports:
      # Host 5433 avoids clashing with a local Homebrew Postgres on 5432.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      target: dev
    environment:
      DATABASE_HOST: db
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: password
      RAILS_ENV: development
      # SMART Backend Services 認証の有効化トグル。既定は無効。
      # 有効化する場合: FHIR_AUTH_ENABLED=true docker compose up
      FHIR_AUTH_ENABLED: ${FHIR_AUTH_ENABLED:-false}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
